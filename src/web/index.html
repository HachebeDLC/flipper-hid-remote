<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipper HID Remote</title>
</head>
<body>
    <h1>Flipper HID Remote Dashboard</h1>
    <button id="connectBtn">Connect to Flipper</button>
    <button id="sendBtn" disabled>Send Test Key ('a')</button>
    
    <script src="app.js?v=16"></script>
    <script>
        document.getElementById('connectBtn').addEventListener('click', async () => {
            const success = await connectToFlipper();
            if (success) {
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('connectBtn').textContent = 'Connected';
            }
        });
        
        document.getElementById('sendBtn').addEventListener('click', async () => {
            const btn = document.getElementById('sendBtn');
            let countdown = 3;
            btn.disabled = true;
            
            const interval = setInterval(() => {
                btn.textContent = `Sending in ${countdown}...`;
                countdown--;
                if (countdown < 0) {
                    clearInterval(interval);
                    console.log('Sending HID command: key "a"');
                    sendKeyToFlipper('a');
                    btn.textContent = "Send Test Key ('a')";
                    btn.disabled = false;
                }
            }, 1000);
        });
    </script>
</body>
</html>
