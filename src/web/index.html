<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipper HID Remote</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #111; color: #eee; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; background: #ff8c00; color: white; }
        button:disabled { background: #555; }
        #status { margin: 20px; font-weight: bold; }
        .kb-container { margin-top: 30px; border: 1px solid #444; padding: 20px; border-radius: 12px; }
        #hiddenInput { opacity: 0; position: absolute; z-index: -1; }
        .icon { font-size: 40px; cursor: pointer; margin: 20px; display: inline-block; }
        .mod-panel { display: flex; justify-content: center; flex-wrap: wrap; margin: 20px; }
        .mod-btn { background: #333; color: #aaa; width: 60px; height: 60px; line-height: 60px; border-radius: 50%; margin: 5px; cursor: pointer; border: 2px solid #555; font-weight: bold; }
        .mod-btn.active { background: #00bcd4; color: white; border-color: #eee; }
        .shortcut-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin: 20px; }
        .shortcut-btn { background: #222; border: 1px solid #444; padding: 10px; border-radius: 6px; cursor: pointer; }
        .os-toggle { margin: 20px; padding: 10px; border: 1px solid #444; border-radius: 8px; display: inline-block; }
    </style>
</head>
<body>
    <h1>Flipper HID Remote</h1>
    
    <div id="status">Disconnected</div>
    <button id="connectBtn">Connect to Flipper</button>

    <div class="os-toggle">
        Target OS: 
        <select id="osSelect" style="background: #222; color: #fff; padding: 5px;">
            <option value="pc">Windows/Linux (Ctrl)</option>
            <option value="ios">iPhone/Mac (Cmd)</option>
        </select>
    </div>

    <div class="mod-panel">
        <div class="mod-btn" id="ctrlBtn" data-bit="0x01">Ctrl</div>
        <div class="mod-btn" id="shiftBtn" data-bit="0x02">Shift</div>
        <div class="mod-btn" id="altBtn" data-bit="0x04">Alt</div>
        <div class="mod-btn" id="cmdBtn" data-bit="0x08">Cmd</div>
    </div>

    <div class="shortcut-grid">
        <div class="shortcut-btn" id="copyBtn">Copy (C)</div>
        <div class="shortcut-btn" id="pasteBtn">Paste (V)</div>
        <div class="shortcut-btn" id="undoBtn">Undo (Z)</div>
        <div class="shortcut-btn" id="saveBtn">Save (S)</div>
    </div>
    
    <div class="kb-container">
        <div id="kbIcon" class="icon" title="Open Keyboard">⌨️</div>
        <input type="text" id="hiddenInput" autocapitalize="none" autocomplete="off" spellcheck="false">
        <p>Tap the keyboard icon or use your PC keyboard.</p>
    </div>

    <script src="app.js?v=24"></script>
    <script>
        const connectBtn = document.getElementById('connectBtn');
        const statusDiv = document.getElementById('status');
        const kbIcon = document.getElementById('kbIcon');
        const hiddenInput = document.getElementById('hiddenInput');
        const osSelect = document.getElementById('osSelect');

        let currentMods = 0;
        let bleQueue = [];
        let bleProcessing = false;

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // STRICT SEQUENTIAL QUEUE
        const queueSend = async (actionFn) => {
            bleQueue.push(actionFn);
            if (bleProcessing) return;
            
            bleProcessing = true;
            while (bleQueue.length > 0) {
                const fn = bleQueue.shift();
                try {
                    await fn();
                    await sleep(60); // Essential cool-down for Flipper buffer
                } catch (e) {
                    console.error("BLE Queue Error:", e);
                }
            }
            bleProcessing = false;
        };

        connectBtn.addEventListener('click', async () => {
            statusDiv.textContent = 'Connecting...';
            if (await connectToFlipper()) {
                statusDiv.textContent = 'Connected to Flipper';
                connectBtn.disabled = true;
            } else {
                statusDiv.textContent = 'Connection failed';
            }
        });

        kbIcon.addEventListener('click', () => { hiddenInput.focus(); });

        // Normal typing
        hiddenInput.addEventListener('input', (e) => {
            const char = e.data;
            if (char && char.length === 1) {
                queueSend(() => sendKeyToFlipper(char));
            }
            hiddenInput.value = '';
        });

        // Shortcuts and Modifiers
        window.addEventListener('keydown', (e) => {
            const isIOS = osSelect.value === 'ios';
            
            // 1. Sync Modifiers
            let newMods = 0;
            if (e.shiftKey) newMods |= 0x02;
            if (e.altKey) newMods |= 0x04;
            if (e.ctrlKey) newMods |= isIOS ? 0x08 : 0x01; // Auto-map PC-Ctrl to iOS-Cmd
            if (e.metaKey) newMods |= 0x08;

            if (newMods !== currentMods) {
                currentMods = newMods;
                queueSend(() => sendModifiersToFlipper(currentMods));
                // UI Sync
                document.getElementById('ctrlBtn').classList.toggle('active', !!(currentMods & 0x01));
                document.getElementById('shiftBtn').classList.toggle('active', !!(currentMods & 0x02));
                document.getElementById('altBtn').classList.toggle('active', !!(currentMods & 0x04));
                document.getElementById('cmdBtn').classList.toggle('active', !!(currentMods & 0x08));
            }

            // 2. Handle Shortcuts (Ctrl/Cmd + Key)
            if (e.ctrlKey || e.metaKey || e.altKey) {
                // If it's a single letter, the 'input' event won't fire, so we catch it here
                if (e.key.length === 1 && e.key !== 'Control' && e.key !== 'Alt' && e.key !== 'Shift' && e.key !== 'Meta') {
                    e.preventDefault();
                    queueSend(() => sendKeyToFlipper(e.key.toLowerCase()));
                }
            }

            // 3. Special Keys
            if (e.key === 'Backspace' || e.key === 'Enter' || e.key === 'Delete') {
                if (document.activeElement === hiddenInput || e.ctrlKey || e.metaKey) {
                    e.preventDefault();
                    if (e.key === 'Enter') {
                        queueSend(() => sendKeyToFlipper('\n'));
                    } else if (e.key === 'Backspace') {
                        queueSend(async () => {
                            await sendKeyDownToFlipper(0x2A);
                            await sleep(30);
                            await sendKeyUpToFlipper(0x2A);
                        });
                    } else if (e.key === 'Delete') {
                        queueSend(async () => {
                            await sendKeyDownToFlipper(0x4C);
                            await sleep(30);
                            await sendKeyUpToFlipper(0x4C);
                        });
                    }
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            const isIOS = osSelect.value === 'ios';
            let newMods = 0;
            if (e.shiftKey) newMods |= 0x02;
            if (e.altKey) newMods |= 0x04;
            if (e.ctrlKey) newMods |= isIOS ? 0x08 : 0x01;
            if (e.metaKey) newMods |= 0x08;

            if (newMods !== currentMods) {
                currentMods = newMods;
                queueSend(() => sendModifiersToFlipper(currentMods));
                document.getElementById('ctrlBtn').classList.toggle('active', !!(currentMods & 0x01));
                document.getElementById('shiftBtn').classList.toggle('active', !!(currentMods & 0x02));
                document.getElementById('altBtn').classList.toggle('active', !!(currentMods & 0x04));
                document.getElementById('cmdBtn').classList.toggle('active', !!(currentMods & 0x08));
            }
        });

        // Manual Buttons
        const manualShortcut = (keyChar) => {
            const isIOS = osSelect.value === 'ios';
            const mod = isIOS ? 0x08 : 0x01;
            queueSend(async () => {
                await sendModifiersToFlipper(currentMods | mod);
                await sleep(40);
                await sendKeyToFlipper(keyChar);
                await sleep(40);
                await sendModifiersToFlipper(currentMods);
            });
        };

        document.getElementById('copyBtn').addEventListener('click', () => manualShortcut('c'));
        document.getElementById('pasteBtn').addEventListener('click', () => manualShortcut('v'));
        document.getElementById('undoBtn').addEventListener('click', () => manualShortcut('z'));
        document.getElementById('saveBtn').addEventListener('click', () => manualShortcut('s'));

        document.querySelectorAll('.mod-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const bit = parseInt(btn.getAttribute('data-bit'), 16);
                currentMods ^= bit;
                btn.classList.toggle('active');
                queueSend(() => sendModifiersToFlipper(currentMods));
            });
        });
    </script>
</body>
</html>
