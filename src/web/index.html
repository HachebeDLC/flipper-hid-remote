<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flipper HID Remote</title>
    <style id="themeStyles">
        :root { --bg: #111; --text: #eee; --panel: #1a1a1a; --border: #444; --accent: #ff8c00; --btn-active: #00bcd4; }
        .light-mode { --bg: #f0f0f0; --text: #222; --panel: #fff; --border: #ccc; --accent: #e67e00; --btn-active: #0097a7; }
        
        body { font-family: sans-serif; text-align: center; padding: 10px; background: var(--bg); color: var(--text); touch-action: none; overflow: hidden; transition: background 0.3s, color 0.3s; }
        button { padding: 12px 20px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 8px; border: none; background: var(--accent); color: white; }
        button:disabled { background: #555; }
        
        .panel { border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 20px; background: var(--panel); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .mod-panel { display: flex; justify-content: center; flex-wrap: wrap; }
        .mod-btn { background: #333; color: #aaa; width: 50px; height: 50px; line-height: 50px; border-radius: 50%; margin: 5px; cursor: pointer; border: 2px solid #555; font-weight: bold; font-size: 12px; }
        .mod-btn.active { background: var(--btn-active); color: white; border-color: #eee; }
        
        #trackpad { width: 100%; height: 280px; background: var(--bg); border: 2px solid var(--border); border-radius: 15px; margin: 15px 0; touch-action: none; position: relative; overflow: hidden; cursor: crosshair; }
        #trackpad::after { content: 'TRACKPAD'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--border); font-weight: bold; pointer-events: none; }
        
        .mouse-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .mouse-btn { flex: 1; height: 60px; background: var(--panel); border: 2px solid var(--border); border-radius: 10px; line-height: 60px; font-weight: bold; cursor: pointer; user-select: none; }
        .mouse-btn:active { background: var(--btn-active); color: #fff; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #themeToggle { font-size: 20px; cursor: pointer; background: none; border: 1px solid var(--border); padding: 5px 10px; }

        .slider-box { margin: 10px 0; font-size: 14px; }
        #hiddenInput { opacity: 0; position: absolute; z-index: -1; }
        .icon { font-size: 30px; cursor: pointer; margin: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="top-bar">
        <button id="themeToggle">🌙</button>
        <div id="status">Disconnected</div>
        <button id="connectBtn">Connect</button>
    </div>

    <div class="panel">
        <div style="display: flex; justify-content: space-around; font-size: 13px;">
            <div>
                OS: <select id="osSelect" style="background: var(--bg); color: var(--text); border: 1px solid var(--border);">
                    <option value="pc">PC</option>
                    <option value="ios">iOS</option>
                </select>
            </div>
            <div class="slider-box">
                Sense: <input type="range" id="senseSlider" min="0.5" max="4.0" step="0.1" value="1.5" style="width: 80px;">
                <span id="senseVal">1.5x</span>
            </div>
        </div>
    </div>

    <div id="trackpad"></div>

    <div class="mouse-btns">
        <div class="mouse-btn" id="leftClickBtn">LEFT</div>
        <div class="mouse-btn" id="rightClickBtn">RIGHT</div>
    </div>

    <div class="panel">
        <div class="mod-panel">
            <div class="mod-btn" id="ctrlBtn" data-bit="0x01">Ctrl</div>
            <div class="mod-btn" id="shiftBtn" data-bit="0x02">Shift</div>
            <div class="mod-btn" id="altBtn" data-bit="0x04">Alt</div>
            <div class="mod-btn" id="cmdBtn" data-bit="0x08">Cmd</div>
        </div>
    </div>
    
    <div style="display: flex; justify-content: center; align-items: center;">
        <div id="kbIcon" class="icon" title="Open Keyboard">⌨️</div>
        <input type="text" id="hiddenInput" autocapitalize="none" autocomplete="off" spellcheck="false">
        <p style="font-size: 12px; margin-left: 10px;">Tap icon to type</p>
    </div>

    <script src="app.js?v=31"></script>
    <script>
        const connectBtn = document.getElementById('connectBtn');
        const themeToggle = document.getElementById('themeToggle');
        const statusDiv = document.getElementById('status');
        const kbIcon = document.getElementById('kbIcon');
        const hiddenInput = document.getElementById('hiddenInput');
        const osSelect = document.getElementById('osSelect');
        const trackpad = document.getElementById('trackpad');
        const senseSlider = document.getElementById('senseSlider');
        const senseVal = document.getElementById('senseVal');

        let currentMods = 0;
        let bleQueue = [];
        let bleProcessing = false;

        // --- Persistence ---
        let sensitivity = parseFloat(localStorage.getItem('fkb_sense') || "1.5");
        osSelect.value = localStorage.getItem('fkb_os') || "pc";
        senseSlider.value = sensitivity;
        senseVal.textContent = sensitivity.toFixed(1) + "x";

        const setDarkMode = (isDark) => {
            document.body.classList.toggle('light-mode', !isDark);
            themeToggle.textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('fkb_theme', isDark ? 'dark' : 'light');
        };
        setDarkMode(localStorage.getItem('fkb_theme') !== 'light');

        themeToggle.addEventListener('click', () => setDarkMode(document.body.classList.contains('light-mode')));
        osSelect.addEventListener('change', () => localStorage.setItem('fkb_os', osSelect.value));
        senseSlider.addEventListener('input', () => {
            sensitivity = parseFloat(senseSlider.value);
            senseVal.textContent = sensitivity.toFixed(1) + "x";
            localStorage.setItem('fkb_sense', sensitivity);
        });

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        const queueSend = async (actionFn) => {
            bleQueue.push(actionFn);
            if (bleProcessing) return;
            bleProcessing = true;
            while (bleQueue.length > 0) {
                const fn = bleQueue.shift();
                try { await fn(); await sleep(15); } catch (e) { console.error(e); }
            }
            bleProcessing = false;
        };

        connectBtn.addEventListener('click', async () => {
            statusDiv.textContent = 'Connecting...';
            if (await connectToFlipper()) {
                statusDiv.textContent = 'Connected';
                connectBtn.disabled = true;
            } else { statusDiv.textContent = 'Failed'; }
        });

        kbIcon.addEventListener('click', () => hiddenInput.focus());

        hiddenInput.addEventListener('input', (e) => {
            const char = e.data;
            if (char && char.length === 1) queueSend(() => sendKeyToFlipper(char));
            hiddenInput.value = '';
        });

        // Trackpad Logic
        let pendingDX = 0, pendingDY = 0, lastX = 0, lastY = 0, isMoving = false, startTime = 0;

        const handleStart = (x, y) => { isMoving = true; lastX = x; lastY = y; startTime = Date.now(); };
        const handleMove = (x, y, mx, my) => {
            if (document.pointerLockElement === trackpad) { pendingDX += mx * sensitivity; pendingDY += my * sensitivity; }
            else if (isMoving) { pendingDX += (x - lastX) * sensitivity; pendingDY += (y - lastY) * sensitivity; lastX = x; lastY = y; }
        };

        trackpad.addEventListener('touchstart', (e) => { handleStart(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); });
        trackpad.addEventListener('touchmove', (e) => { handleMove(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); });
        trackpad.addEventListener('touchend', () => {
            if (isMoving && (Date.now() - startTime < 200) && Math.abs(pendingDX) < 5) {
                queueSend(async () => { await sendMouseButtonToFlipper(0x01); await sleep(30); await sendMouseButtonToFlipper(0x00); });
            }
            isMoving = false;
        });

        trackpad.addEventListener('mousedown', (e) => {
            if (osSelect.value === 'pc') trackpad.requestPointerLock();
            else handleStart(e.clientX, e.clientY);
        });
        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY, e.movementX, e.movementY));
        window.addEventListener('mouseup', () => { isMoving = false; });

        window.addEventListener('wheel', (e) => {
            if (document.pointerLockElement === trackpad || isMoving) {
                e.preventDefault();
                queueSend(() => sendMouseScrollToFlipper(e.deltaY > 0 ? -1 : 1));
            }
        }, { passive: false });

        setInterval(() => {
            if (Math.abs(pendingDX) > 0.1 || Math.abs(pendingDY) > 0.1) {
                queueSend(() => sendMousePosToFlipper(Math.round(pendingDX), Math.round(pendingDY)));
                pendingDX = 0; pendingDY = 0;
            }
        }, 30);

        const btn = (id, m) => {
            const el = document.getElementById(id);
            const d = () => queueSend(() => sendMouseButtonToFlipper(m));
            const u = () => queueSend(() => sendMouseButtonToFlipper(0x00));
            el.addEventListener('mousedown', d); el.addEventListener('mouseup', u);
            el.addEventListener('touchstart', (e) => { d(); e.preventDefault(); }); el.addEventListener('touchend', u);
        };
        btn('leftClickBtn', 0x01); btn('rightClickBtn', 0x02);

        window.addEventListener('keydown', (e) => {
            const isIOS = osSelect.value === 'ios';
            let newMods = currentMods;
            if (e.key === 'Shift') newMods |= 0x02;
            if (e.key === 'Alt') newMods |= 0x04;
            if (e.key === 'Control') newMods |= isIOS ? 0x08 : 0x01;
            if (e.key === 'Meta') newMods |= 0x08;

            if (newMods !== currentMods) {
                currentMods = newMods;
                queueSend(() => sendModifiersToFlipper(currentMods));
                ['ctrlBtn','shiftBtn','altBtn','cmdBtn'].forEach((id,i) => document.getElementById(id).classList.toggle('active', !!(currentMods & (1<<i))));
            }

            if (['Backspace', 'Enter', 'Delete', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                if (e.key === 'Enter') queueSend(() => sendKeyToFlipper('\n'));
                else {
                    const map = {Backspace:0x2A, Delete:0x4C, ArrowRight:0x4F, ArrowLeft:0x50, ArrowDown:0x51, ArrowUp:0x52};
                    queueSend(async () => { await sendKeyDownToFlipper(map[e.key]); await sleep(30); await sendKeyUpToFlipper(map[e.key]); });
                }
            }
        });
    </script>
</body>
</html>
