<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flipper HID Remote</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 10px; background: #111; color: #eee; touch-action: none; overflow: hidden; }
        button { padding: 12px 20px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 8px; border: none; background: #ff8c00; color: white; }
        button:disabled { background: #555; }
        #status { margin: 10px; font-weight: bold; }
        
        .panel { border: 1px solid #444; padding: 15px; border-radius: 12px; margin-bottom: 20px; background: #1a1a1a; }
        
        .mod-panel { display: flex; justify-content: center; flex-wrap: wrap; }
        .mod-btn { background: #333; color: #aaa; width: 50px; height: 50px; line-height: 50px; border-radius: 50%; margin: 5px; cursor: pointer; border: 2px solid #555; font-weight: bold; font-size: 12px; }
        .mod-btn.active { background: #00bcd4; color: white; border-color: #eee; }
        
        #trackpad { width: 100%; height: 300px; background: #222; border: 2px solid #444; border-radius: 15px; margin: 20px 0; touch-action: none; position: relative; overflow: hidden; cursor: crosshair; }
        #trackpad::after { content: 'TRACKPAD'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #444; font-weight: bold; pointer-events: none; font-size: 14px; }
        
        .mouse-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .mouse-btn { flex: 1; height: 70px; background: #333; border: 2px solid #444; border-radius: 10px; line-height: 70px; font-weight: bold; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
        .mouse-btn:active { background: #00bcd4; color: #fff; }

        .shortcut-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; }
        .shortcut-btn { background: #222; border: 1px solid #444; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 14px; }

        #hiddenInput { opacity: 0; position: absolute; z-index: -1; }
        .icon { font-size: 30px; cursor: pointer; margin: 10px; display: inline-block; }
        .os-toggle { margin: 10px; padding: 5px; border: 1px solid #444; border-radius: 8px; display: inline-block; font-size: 14px; }
        
        .slider-box { margin: 10px; padding: 10px; border: 1px solid #444; border-radius: 8px; display: inline-block; font-size: 14px; }
        input[type=range] { vertical-align: middle; }
    </style>
</head>
<body>
    <h1>Flipper HID Remote</h1>
    
    <div id="status">Disconnected</div>
    <button id="connectBtn">Connect to Flipper</button>

    <div class="os-toggle">
        Target OS: 
        <select id="osSelect" style="background: #222; color: #fff; padding: 5px; border: none;">
            <option value="pc">Windows/Linux (Ctrl)</option>
            <option value="ios">iPhone/Mac (Cmd)</option>
        </select>
    </div>

    <div class="slider-box">
        Sensitivity: 
        <input type="range" id="senseSlider" min="0.5" max="4.0" step="0.1" value="1.5">
        <span id="senseVal">1.5x</span>
    </div>

    <div id="trackpad"></div>

    <div class="mouse-btns">
        <div class="mouse-btn" id="leftClickBtn">LEFT</div>
        <div class="mouse-btn" id="rightClickBtn">RIGHT</div>
    </div>

    <div class="panel">
        <div class="mod-panel">
            <div class="mod-btn" id="ctrlBtn" data-bit="0x01">Ctrl</div>
            <div class="mod-btn" id="shiftBtn" data-bit="0x02">Shift</div>
            <div class="mod-btn" id="altBtn" data-bit="0x04">Alt</div>
            <div class="mod-btn" id="cmdBtn" data-bit="0x08">Cmd</div>
        </div>
    </div>

    <div class="panel">
        <div class="shortcut-grid">
            <div class="shortcut-btn" id="copyBtn">Copy (C)</div>
            <div class="shortcut-btn" id="pasteBtn">Paste (V)</div>
            <div class="shortcut-btn" id="undoBtn">Undo (Z)</div>
            <div class="shortcut-btn" id="saveBtn">Save (S)</div>
        </div>
    </div>
    
    <div>
        <div id="kbIcon" class="icon" title="Open Keyboard">⌨️</div>
        <input type="text" id="hiddenInput" autocapitalize="none" autocomplete="off" spellcheck="false">
    </div>

    <script src="app.js?v=30"></script>
    <script>
        const connectBtn = document.getElementById('connectBtn');
        const statusDiv = document.getElementById('status');
        const kbIcon = document.getElementById('kbIcon');
        const hiddenInput = document.getElementById('hiddenInput');
        const osSelect = document.getElementById('osSelect');
        const trackpad = document.getElementById('trackpad');
        const senseSlider = document.getElementById('senseSlider');
        const senseVal = document.getElementById('senseVal');

        let currentMods = 0;
        let bleQueue = [];
        let bleProcessing = false;
        let sensitivity = parseFloat(localStorage.getItem('fkb_sense') || "1.5");

        // Load Persisted Web Settings
        osSelect.value = localStorage.getItem('fkb_os') || "pc";
        senseSlider.value = sensitivity;
        senseVal.textContent = sensitivity.toFixed(1) + "x";

        osSelect.addEventListener('change', () => localStorage.setItem('fkb_os', osSelect.value));
        senseSlider.addEventListener('input', () => {
            sensitivity = parseFloat(senseSlider.value);
            senseVal.textContent = sensitivity.toFixed(1) + "x";
            localStorage.setItem('fkb_sense', sensitivity);
        });

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        const queueSend = async (actionFn) => {
            bleQueue.push(actionFn);
            if (bleProcessing) return;
            bleProcessing = true;
            while (bleQueue.length > 0) {
                const fn = bleQueue.shift();
                try { await fn(); await sleep(10); } catch (e) { console.error(e); }
            }
            bleProcessing = false;
        };

        connectBtn.addEventListener('click', async () => {
            statusDiv.textContent = 'Connecting...';
            if (await connectToFlipper()) {
                statusDiv.textContent = 'Connected to Flipper';
                connectBtn.disabled = true;
            } else { statusDiv.textContent = 'Connection failed'; }
        });

        kbIcon.addEventListener('click', () => { hiddenInput.focus(); });

        hiddenInput.addEventListener('input', (e) => {
            const char = e.data;
            if (char && char.length === 1) queueSend(() => sendKeyToFlipper(char));
            hiddenInput.value = '';
        });

        // TRACKPAD LOGIC
        let pendingDX = 0;
        let pendingDY = 0;
        let lastMoveX = 0;
        let lastMoveY = 0;
        let isTouching = false;
        let startTime = 0;

        trackpad.addEventListener('click', () => {
            if (osSelect.value === 'pc') trackpad.requestPointerLock();
            else {
                queueSend(async () => { await sendMouseButtonToFlipper(0x01); await sleep(30); await sendMouseButtonToFlipper(0x00); });
            }
        });

        const handleStart = (x, y) => { isTouching = true; lastMoveX = x; lastMoveY = y; startTime = Date.now(); };
        const handleMove = (x, y, movementX, movementY) => {
            if (document.pointerLockElement === trackpad) {
                pendingDX += movementX * sensitivity;
                pendingDY += movementY * sensitivity;
            } else if (isTouching) {
                pendingDX += (x - lastMoveX) * sensitivity;
                pendingDY += (y - lastMoveY) * sensitivity;
                lastMoveX = x; lastMoveY = y;
            }
        };

        trackpad.addEventListener('touchstart', (e) => { handleStart(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); });
        trackpad.addEventListener('touchmove', (e) => { handleMove(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); });
        trackpad.addEventListener('touchend', () => { isTouching = false; });

        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY, e.movementX, e.movementY));

        window.addEventListener('wheel', (e) => {
            if (document.pointerLockElement === trackpad || isTouching) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -1 : 1;
                queueSend(() => sendMouseScrollToFlipper(delta));
            }
        }, { passive: false });

        setInterval(() => {
            if (Math.abs(pendingDX) > 0.5 || Math.abs(pendingDY) > 0.5) {
                const dx = Math.round(pendingDX);
                const dy = Math.round(pendingDY);
                queueSend(() => sendMousePosToFlipper(dx, dy));
                pendingDX = 0; pendingDY = 0;
            }
        }, 20);

        const btnHandler = (id, mask) => {
            const btn = document.getElementById(id);
            const down = () => queueSend(() => sendMouseButtonToFlipper(mask));
            const up = () => queueSend(() => sendMouseButtonToFlipper(0x00));
            btn.addEventListener('mousedown', down);
            btn.addEventListener('mouseup', up);
            btn.addEventListener('touchstart', (e) => { down(); e.preventDefault(); });
            btn.addEventListener('touchend', up);
        };
        btnHandler('leftClickBtn', 0x01);
        btnHandler('rightClickBtn', 0x02);

        window.addEventListener('keydown', (e) => {
            const isIOS = osSelect.value === 'ios';
            let newMods = currentMods;
            if (e.key === 'Shift') newMods |= 0x02;
            if (e.key === 'Alt') newMods |= 0x04;
            if (e.key === 'Control') newMods |= isIOS ? 0x08 : 0x01;
            if (e.key === 'Meta') newMods |= 0x08;

            if (newMods !== currentMods) {
                currentMods = newMods;
                queueSend(() => sendModifiersToFlipper(currentMods));
                document.getElementById('ctrlBtn').classList.toggle('active', !!(currentMods & 0x01));
                document.getElementById('shiftBtn').classList.toggle('active', !!(currentMods & 0x02));
                document.getElementById('altBtn').classList.toggle('active', !!(currentMods & 0x04));
                document.getElementById('cmdBtn').classList.toggle('active', !!(currentMods & 0x08));
            }

            if (['Backspace', 'Enter', 'Delete', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                if (e.key === 'Enter') queueSend(() => sendKeyToFlipper('\n'));
                else if (e.key === 'Backspace') queueSend(async () => { await sendKeyDownToFlipper(0x2A); await sleep(30); await sendKeyUpToFlipper(0x2A); });
                else if (e.key === 'Delete') queueSend(async () => { await sendKeyDownToFlipper(0x4C); await sleep(30); await sendKeyUpToFlipper(0x4C); });
                else if (e.key === 'ArrowRight') queueSend(async () => { await sendKeyDownToFlipper(0x4F); await sleep(30); await sendKeyUpToFlipper(0x4F); });
                else if (e.key === 'ArrowLeft') queueSend(async () => { await sendKeyDownToFlipper(0x50); await sleep(30); await sendKeyUpToFlipper(0x50); });
                else if (e.key === 'ArrowDown') queueSend(async () => { await sendKeyDownToFlipper(0x51); await sleep(30); await sendKeyUpToFlipper(0x51); });
                else if (e.key === 'ArrowUp') queueSend(async () => { await sendKeyDownToFlipper(0x52); await sleep(30); await sendKeyUpToFlipper(0x52); });
            }
        });

        window.addEventListener('keyup', (e) => {
            const isIOS = osSelect.value === 'ios';
            let newMods = currentMods;
            if (e.key === 'Shift') newMods &= ~0x02;
            if (e.key === 'Alt') newMods &= ~0x04;
            if (e.key === 'Control') newMods &= ~(isIOS ? 0x08 : 0x01);
            if (e.key === 'Meta') newMods &= ~0x08;

            if (newMods !== currentMods) {
                currentMods = newMods;
                queueSend(() => sendModifiersToFlipper(currentMods));
                document.getElementById('ctrlBtn').classList.toggle('active', !!(currentMods & 0x01));
                document.getElementById('shiftBtn').classList.toggle('active', !!(currentMods & 0x02));
                document.getElementById('altBtn').classList.toggle('active', !!(currentMods & 0x04));
                document.getElementById('cmdBtn').classList.toggle('active', !!(currentMods & 0x08));
            }
        });
    </script>
</body>
</html>
